<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашка 12</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
<main>
    <h1>Хелоу еврібаді</h1>
    <p>Згадую, що таке верстка</p>
    <button class="btn-open-modal" data-target="#main-modal">Відкрити модалку</button>
    <div id="main-modal" class="modal-overlay hidden">
        <div class="modal">
            <button class="btn-close-modal">&times;</button>
            <div class="modal-container">
                <h2>Тут може бути ваша реклама</h2>
                <img src="src/image.png" alt="Згадати все" />
                <button class="btn-close-modal btn-main-bottom">Шо це бл*?</button>
            </div>
        </div>
    </div>

    <div class="dropdown-container">
        <div class="dropdown">
            <button class="dropdown-toggle">Файл &#9662;</button>
            <ul class="dropdown-menu">
                <li><a href="#">Новий</a></li>
                <li><a href="#">Відкрити</a></li>
                <li><a href="#">Зберегти</a></li>
            </ul>
        </div>
        <div class="dropdown">
            <button class="dropdown-toggle">Редагувати &#9662;</button>
            <ul class="dropdown-menu">
                <li><a href="#">Копіювати</a></li>
                <li><a href="#">Вставити</a></li>
                <li><a href="#">Вирізати</a></li>
            </ul>
        </div>
        <div class="dropdown">
            <button class="dropdown-toggle">Відіслати &#9662;</button>
            <ul class="dropdown-menu">
                <li><a href="#">Email</a></li>
                <li><a href="#">Telegram</a></li>
                <li><a href="#">Голуб</a></li>
                <li><a href="#">Гонец</a></li>
            </ul>
        </div>
    </div>

    <button class="btn-open-confirm-dialog">Відкрити конфірм діалог</button>
    <div class="confirm-dialog-container">
        <div id="confirm-modal" class="modal-overlay hidden">
            <div class="modal">
                <p class="confirm-message"></p>
                <div class="modal-container">
                    <img src="src/image.png" alt="Згадати все" />
                    <button class="btn-confirm">Підтвердити</button>
                    <button class="btn-cancel">Скасувати</button>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
